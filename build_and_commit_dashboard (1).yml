name: Build and commit patient dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build workbook
        run: |
          mkdir -p output
          python build_dashboard.py             --input data/Patient_Summary.csv             --output output/patient_recommendation_dashboard.xlsx

      - name: Commit updated workbook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/patient_recommendation_dashboard.xlsx
          if git diff --cached --quiet; then
            echo "No workbook changes to commit."
          else
            git commit -m "Update patient dashboard"
            git push
          fi

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: patient-recommendation-dashboard
          path: output/patient_recommendation_dashboard.xlsx
