name: Build Stepped Care Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard
        run: |
          python build_dashboard.py --input data/Stepped_Care_Tracking.csv --output output/stepped_care_dashboard.xlsx

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: stepped-care-dashboard
          path: output/stepped_care_dashboard.xlsx
